<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 320px; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .subtitle { font-size: 12px; color: #888; margin-bottom: 16px; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
    #exportBtn { background: #22c55e; color: #000; }
    #exportBtn:hover { background: #16a34a; }
    #exportBtn:disabled { background: #333; color: #666; cursor: not-allowed; }
    .progress { margin-top: 16px; display: none; }
    .progress-bar { height: 6px; background: #222; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
    .progress-fill { height: 100%; background: #22c55e; border-radius: 3px; transition: width 0.3s; width: 0%; }
    .status { font-size: 12px; color: #888; }
    .stats { margin-top: 12px; font-size: 12px; color: #666; display: none; }
    .error { color: #ef4444; font-size: 12px; margin-top: 8px; display: none; }
    .done { margin-top: 12px; font-size: 13px; color: #22c55e; display: none; }
  </style>
</head>
<body>
  <h1>Perplexity Export</h1>
  <p class="subtitle">Export all your threads to JSON</p>
  <button id="exportBtn">Export All Threads</button>
  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="status" id="status">Starting...</div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="error" id="error"></div>
  <div class="done" id="done"></div>
  <script src="popup.js"></script>
</body>
</html>
